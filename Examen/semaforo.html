<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte Práctica</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #badede;
        }

        .semaforo{
            width:160px;
            background:#212529;
            margin:auto;
            padding:20px;
            border-radius:20px;
        }

        .luz{
            width:100px;
            height:100px;
            border-radius:50%;
            margin:20px auto;
            opacity:.3;
        }

        .encendida{
            opacity:1;
            box-shadow:0 0 30px white;
        }

        footer{
            background-color: #3142df;
            margin-top:50px;
            padding:20px;
            text-align:center;
            color:whitesmoke;
        }

    </style>

</head>

<body>
    <!--creo una barra de navegación para posicionar el nombre de la pag y los botones de navegación-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

            <a class="navbar-brand">
                Parte 2 Práctica/Presione un botón para encender el semáforo
            </a>

            <div>
                <a class="btn btn-light me-2"
                    href="index.html">
                    Teoría
                </a>
            </div>
        </div>
    </nav>


    <div class="container">
        <!--Asigno un id a cada luz-->
        <div class="semaforo mt-4">

            <div id="rojo"
                class="luz bg-danger">
            </div>

            <div id="amarillo"
                class="luz bg-warning">
            </div>

            <div id="verde"
                class="luz bg-success">
            </div>

        </div>

        <div class="text-center mt-4">
            <!--Cuando presiono un btn, se envia el color a la función encender-->
            <button
                class="btn btn-danger"
                onclick="encender('rojo')">
                Luz Roja
            </button>

            <button
                class="btn btn-warning"
                onclick="encender('amarillo')">
                Luz Amarilla
            </button>

            <button
                class="btn btn-success"
                onclick="encender('verde')">
                Luz Verde
            </button>
        </div>
    </div>

        <!--document llama a toda la página web para buscar en la misma-->
        <!--classList permite trabajar con las tres clases de colores según su di-->
        <!--el remove("encendida") apaga todas las luces antes de añadir la nueva que se presione en el botón-->
    <script>
        function encender(color){
            
            document
            .getElementById("rojo")
            .classList
            .remove("encendida");

            document
            .getElementById("amarillo")
            .classList
            .remove("encendida");

            document
            .getElementById("verde")
            .classList
            .remove("encendida");

            document
            .getElementById(color)
            .classList
            .add("encendida");
        }

    </script>

    </div>
        <footer>
            Examen primer parcial SEMANA 4
        </footer>
    </div>
</body>
</html>
