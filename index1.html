<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMANA 5</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background-color: #badede;
        }

        footer{
            background-color: #3142df;
            margin-top:50px;
            padding:20px;
            text-align:center;
            color:whitesmoke;
        }
    </style> 


</head>
<body>

<div class="container mt-5">


    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3>Ingresar o Eliminar</h3>
        </div>

        <div class="card-body">
            <!--Abro 5 label para guardar la información del producto-->
            <div class="mb-3">
                <label>ID del Producto</label>
                <input type="text" id="id" class="form-control">
            </div>

            <div class="mb-3">
                <label>Nombre del Producto</label>
                <input type="text" id="nombre" class="form-control">
            </div>

            <div class="mb-3">
                <label>Descripción</label>
                <textarea id="descripcion" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label>Precio de Compra</label>
                <input type="text" id="compra" class="form-control">
            </div>

            <div class="mb-3">
                <label>Precio de Venta</label>
                <input type="text" id="venta" class="form-control">
            </div>

            <!--Creo los btn para cada acción-->
            <button class="btn btn-success" onclick="guardar()">
                Guardar
            </button>

            <button class="btn btn-danger" onclick="eliminarProducto()">
                Eliminar
            </button>

        </div>
    </div>

</div>

    </div>
        <footer>
            Semana 5
        </footer>
    </div>
<!--Creo 5 variables auxiliares ayudados de la palabra reservado let para obtener los valores ingresaros en pantalla-->
<!--Me ayudo de un if para validar que los campos no estén vacios-->
<!--Transformo además mis campos texto de compra y venta en números, me ayudo con patron como auxiliar -->
<!--La expresión ^\d+(\.\d+)?$ evalua el texto ingresado permitiendo que sean solo numeros y el punto decimal-->
<!--La función eliminar me permite eliminar por id monstrandome los productos registrados disponibles.-->
<script>
    
    let productos=[];

        function guardar(){
            let id=document.getElementById("id").value;
            let nombre=document.getElementById("nombre").value;
            let descripcion=document.getElementById("descripcion").value;
            let compra=document.getElementById("compra").value;
            let venta=document.getElementById("venta").value;

            if(id=="" || nombre=="" || descripcion=="" || compra=="" || venta==""){
                alert("Ingrese todos los datos, existen campos vacíos");
                return;
            }

            let patron=/^\d+(\.\d+)?$/;

            if(!patron.test(compra) || !patron.test(venta)){
                alert("Compra y venta deben contener solo números");
                return;
            }

        compra=parseFloat(compra);
        venta=parseFloat(venta);

        if(venta<=compra){
                alert("El precio de venta debe ser mayor al precio de compra");
                return;
            }

        let producto={

            id:id,
            nombre:nombre,
            descripcion:descripcion,
            compra:compra,
            venta:venta
        };

        productos.push(producto);

        document.getElementById("id").value="";
        document.getElementById("nombre").value="";
        document.getElementById("descripcion").value="";
        document.getElementById("compra").value="";
        document.getElementById("venta").value="";
        
        alert("Producto guardado correctamente");

    }

        function eliminarProducto(){

            if(productos.length==0){
            alert("Sin productos registrados");
            return;
            }

            let lista="Productos disponibles:\n\n";

            for(let i=0;i<productos.length;i++){
                lista += "ID: " + productos[i].id +
                 " - " + productos[i].descripcion + "\n";
            }

            let idBuscar=prompt(
                lista + "\nIngrese el ID del producto a eliminar:"
            );

            if(idBuscar==null){
                return;
            }

            let posicion=productos.findIndex(
                producto => producto.id==idBuscar
            );

            if(posicion==-1){
                alert("No existe un producto con ese ID");
                return;
            }

            let respuesta=confirm(
                "¿Seguro que desea eliminar el producto " +
                idBuscar + "?"
        )   ;

            if(respuesta){
                productos.splice(posicion,1);
                alert("Producto eliminado correctamente");
            }
            }

</script>

</body>
</html>
